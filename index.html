<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Knomee</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-100: #240446;
      --primary-70:  #7639A1;
      --primary-10:  #e9d9f4;
      --accent-100:  #ea0000;
      --neutral-100: #000000;
      --neutral-90:  #757575;
      --neutral-20:  #e2e2e2;
      --border:      #e8e8e8;
      --bg-page:     #f4fdfb;
      --bg-sidebar:  #f6f6f6;
      --bg-white:    #ffffff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      color: var(--neutral-100);
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--primary-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .navbar-logo {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }
    .navbar-logo svg {
      height: 24px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .navbar-logo-advisor {
      font-size: 18.5px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.18px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 1px;
    }
    .navbar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21.6px;
      font-weight: 600;
      color: var(--primary-100);
      letter-spacing: -0.22px;
      flex-shrink: 0;
    }

    /* ── Shell ── */
    .shell {
      display: flex;
      justify-content: center;
      min-height: 100vh;
      align-items: stretch;
      padding: 84px 24px 24px 24px;
    }

    /* ── Card wrapper (gray + white as one unit) ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 860px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 32px 0 rgba(0,0,0,0.12);
      align-items: stretch;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .sidebar-heading { }
    .sidebar-heading h1 {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.32px;
    }
    .sidebar-heading p {
      font-size: 16px;
      font-weight: 400;
      color: var(--neutral-100);
      line-height: 1.5;
      margin-top: 4px;
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--neutral-100);
      transition: background 0.15s;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
    }
    .nav-item:hover { background: #e8e8e8; }
    .nav-item.active {
      background: var(--neutral-20);
      font-weight: 600;
    }
    .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neutral-100);
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      background: white;
      padding: 38px 48px;
    }
    .main-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }
    .main-header h2 {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: -0.24px;
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 36px; }
    .tab-panel.active .main-header { margin-bottom: 0; }

    /* ── Form elements ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-group label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
      line-height: 1.5;
    }
    .field-group input[type="text"],
    .field-group input[type="url"],
    .field-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--neutral-100);
      background: white;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .field-group input[type="text"]:focus,
    .field-group input[type="url"]:focus,
    .field-group textarea:focus {
      border-color: var(--primary-70);
    }
    .field-group input[readonly] {
      background: #f5f5f6;
      color: var(--neutral-90);
      cursor: default;
    }
    .field-hint {
      font-size: 12px;
      color: var(--neutral-90);
      line-height: 1.5;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    /* ── UTM checkboxes ── */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      margin-bottom: 20px;
    }
    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-70);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .utm-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .utm-desc {
      font-size: 13px;
      font-weight: 500;
      color: var(--neutral-100);
      line-height: 1.4;
    }
    .utm-key {
      font-size: 11px;
      font-weight: 400;
      color: var(--neutral-90);
      font-family: 'Courier New', monospace;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }
    .custom-key-group {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .custom-key-fields {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .custom-key-fields input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: var(--neutral-100);
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-key-fields input:first-child {
      font-family: 'Courier New', monospace;
    }
    .custom-key-fields input:focus { border-color: var(--primary-70); }
    .custom-key-fields input::placeholder { font-family: 'Poppins', sans-serif; }
    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--neutral-100);
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover { border-color: var(--primary-70); background: var(--primary-10); }

    /* ── Advisors box ── */
    .advisors-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
    }

    /* ── Color pickers ── */
    .color-row {
      display: flex;
      gap: 32px;
    }
    .color-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .color-field label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
    }

    /* ── Font fields (side by side, like color row) ── */
    .font-row {
      display: flex;
      gap: 32px;
    }
    .font-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .font-field label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
    }
    .font-field input {
      width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--neutral-100);
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    .font-field input:focus { border-color: var(--primary-70); }
    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      width: 200px;
      background: white;
    }
    .color-input-wrap:focus-within { border-color: var(--primary-70); }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .color-swatch input[type="color"] {
      position: absolute;
      opacity: 0;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      cursor: pointer;
    }
    .color-hex {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: var(--neutral-100);
    }

    /* ── Save button ── */
    .btn-save {
      align-self: flex-end;
      padding: 12px 28px;
      background: var(--primary-100);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--primary-70); }

  </style>
</head>

  <script>
    // ── Google Fonts constants ──
    const WEIGHT_NAMES = {
      100: 'Thin', 200: 'Extra Light', 300: 'Light', 400: 'Regular',
      500: 'Medium', 600: 'Semi Bold', 700: 'Bold', 800: 'Extra Bold', 900: 'Black'
    };

    // Fallback font list (used if the metadata API is unreachable)
    const GF_POPULAR = [
      'ABeeZee','Abril Fatface','Acme','Albert Sans','Alegreya','Alegreya Sans',
      'Alfa Slab One','Alice','Amatic SC','Anonymous Pro','Anton','Arimo',
      'Arvo','Asap','Assistant','Atkinson Hyperlegible','Audiowide','Baloo 2',
      'Barlow','Barlow Condensed','Barlow Semi Condensed','Be Vietnam Pro',
      'Bebas Neue','Bitter','Black Han Sans','Bree Serif','Cabin','Cairo',
      'Cantarell','Cardo','Caveat','Chakra Petch','Chivo','Cinzel','Comfortaa',
      'Commissioner','Concert One','Cormorant Garamond','Courier Prime',
      'Crimson Pro','Crimson Text','DM Mono','DM Sans','DM Serif Display',
      'Dancing Script','Darker Grotesque','Domine','Dosis','EB Garamond',
      'Economica','Encode Sans','Epilogue','Exo 2','Fira Code','Fira Mono',
      'Fira Sans','Fjalla One','Fraunces','Fredoka','Geologica','Gloria Hallelujah',
      'Golos Text','Grandstander','Great Vibes','Heebo','IBM Plex Mono',
      'IBM Plex Sans','IBM Plex Serif','Inconsolata','Indie Flower',
      'Instrument Sans','Instrument Serif','Inter','Inter Tight','JetBrains Mono',
      'Josefin Sans','Josefin Slab','Jost','Kanit','Karla','Kumbh Sans',
      'Lato','League Spartan','Lexend','Libre Baskerville','Libre Franklin',
      'Literata','Lobster','Lora','M PLUS 1','M PLUS Rounded 1c','Manrope',
      'Marcellus','Merriweather','Merriweather Sans','Montserrat','Mulish',
      'Noto Sans','Noto Serif','Nunito','Nunito Sans','Open Sans','Orbitron',
      'Oswald','Outfit','Overpass','Pacifico','Playfair Display',
      'Plus Jakarta Sans','Poppins','PT Mono','PT Sans','PT Serif','Public Sans',
      'Quicksand','Raleway','Readex Pro','Recursive','Red Hat Display',
      'Red Hat Text','Roboto','Roboto Condensed','Roboto Mono','Roboto Slab',
      'Rowdies','Rubik','Sacramento','Saira','Sarabun','Schibsted Grotesk',
      'Sen','Signika','Sofia Sans','Sora','Source Code Pro','Source Serif 4',
      'Space Grotesk','Space Mono','Spectral','Titillium Web','Tomorrow',
      'Ubuntu','Ubuntu Sans','Unbounded','Urbanist','Varela Round','Vollkorn',
      'Work Sans','Yanone Kaffeesatz','Young Serif','Yrsa','Zilla Slab'
    ];

    // ── Font Family datalist — load all Google Fonts ──
    function initFontFamilyList() {
      const dl = document.getElementById('font-family-list');
      fetch('https://fonts.google.com/metadata/fonts')
        .then(r => r.text())
        .then(txt => {
          // Strip XSSI prefix )]}'
          const json = txt.replace(/^\)\]\}'\n?/, '');
          const data = JSON.parse(json);
          const families = (data.familyMetadataList || []).map(f => f.family);
          _populateFamilyDl(dl, families);
        })
        .catch(() => _populateFamilyDl(dl, GF_POPULAR));
    }

    function _populateFamilyDl(dl, families) {
      dl.innerHTML = '';
      families.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        dl.appendChild(opt);
      });
    }

    // ── Font Type datalist — variants actually available for the chosen family ──
    const _typeCache = {};
    function updateFontTypeList(family) {
      if (!family) return;
      const dl = document.getElementById('font-type-list');
      if (_typeCache[family]) { _renderTypeDl(dl, _typeCache[family]); return; }
      const allWeights = '0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;' +
                         '1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900';
      const url = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:ital,wght@${allWeights}&display=swap`;
      fetch(url)
        .then(r => r.text())
        .then(css => {
          const variants = [];
          const seen = new Set();
          const re = /@font-face\s*\{([^}]+)\}/g;
          let m;
          while ((m = re.exec(css)) !== null) {
            const styleM  = /font-style:\s*(\w+)/.exec(m[1]);
            const weightM = /font-weight:\s*(\d+)/.exec(m[1]);
            if (!styleM || !weightM) continue;
            const key = styleM[1] + '_' + weightM[1];
            if (seen.has(key)) continue;
            seen.add(key);
            variants.push({ style: styleM[1], weight: parseInt(weightM[1]) });
          }
          // normal variants first (by weight), then italic (by weight)
          variants.sort((a, b) =>
            a.style !== b.style ? (a.style === 'normal' ? -1 : 1) : a.weight - b.weight
          );
          _typeCache[family] = variants;
          _renderTypeDl(dl, variants);
        })
        .catch(() => {}); // keep current list on error
    }

    function _renderTypeDl(dl, variants) {
      dl.innerHTML = '';
      variants.forEach(v => {
        const wName = WEIGHT_NAMES[v.weight] || ('Weight ' + v.weight);
        const label = v.style === 'italic'
          ? (wName === 'Regular' ? 'Italic' : wName + ' Italic')
          : wName;
        const opt = document.createElement('option');
        opt.value = label;
        dl.appendChild(opt);
      });
    }

    // ── Font preview ──
    const _loadedFonts = new Set();
    function loadGoogleFont(family) {
      if (!family || _loadedFonts.has(family)) return;
      _loadedFonts.add(family);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap`;
      document.head.appendChild(link);
    }
    function typeToWeight(type) {
      const t = type.toLowerCase();
      if (t.includes('thin'))       return 100;
      if (t.includes('extralight') || t.includes('extra light') || t.includes('ultra light')) return 200;
      if (t.includes('light'))      return 300;
      if (t.includes('medium'))     return 500;
      if (t.includes('semibold') || t.includes('semi bold') || t.includes('demi')) return 600;
      if (t.includes('extrabold') || t.includes('extra bold') || t.includes('ultrabold')) return 800;
      if (t.includes('black') || t.includes('heavy')) return 900;
      if (t.includes('bold'))       return 700;
      return 400;
    }
    let _fontTimer;
    function updateFontPreview() {
      const family = document.getElementById('font-family').value.trim() || 'Poppins';
      const type   = document.getElementById('font-type').value.trim()   || 'Regular';
      clearTimeout(_fontTimer);
      _fontTimer = setTimeout(() => {
        loadGoogleFont(family);
        updateFontTypeList(family);
      }, 400);
      const weight = typeToWeight(type);
      const italic = /italic/i.test(type) ? 'italic' : 'normal';
      [document.getElementById('font-family'), document.getElementById('font-type')].forEach(el => {
        el.style.fontFamily  = `'${family}', 'Poppins', sans-serif`;
        el.style.fontWeight  = weight;
        el.style.fontStyle   = italic;
      });
    }
    // init on load
    initFontFamilyList();
    updateFontTypeList('Inter');
    updateFontPreview();

    function addCustomKey() {
      const keyEl  = document.getElementById('custom-key');
      const descEl = document.getElementById('custom-key-desc');
      const key  = keyEl.value.trim();
      const desc = descEl.value.trim();
      if (!key) { keyEl.focus(); return; }
      const displayDesc = desc || key.replace(/_/g, ' ');
      const item = document.createElement('label');
      item.className = 'checkbox-item';
      item.innerHTML =
        `<input type="checkbox" checked />` +
        `<span class="utm-label">` +
          `<span class="utm-desc">${displayDesc}</span>` +
          `<span class="utm-key">${key}</span>` +
        `</span>`;
      document.querySelector('.checkbox-grid').appendChild(item);
      keyEl.value = '';
      descEl.value = '';
      keyEl.focus();
    }

    function updateSlug(name) {
      document.getElementById('org-slug').value = name
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    }

    function updateColor(key, hex) {
      document.getElementById('swatch-' + key).style.background = hex;
      document.getElementById('hex-' + key).value = hex.toUpperCase();
    }

    function updateColorFromHex(key, value) {
      if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
        document.getElementById('swatch-' + key).style.background = value;
        document.querySelector('#swatch-' + key + ' input[type=color]').value = value;
      }
    }
  </script>
